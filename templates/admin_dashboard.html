<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>BESTTIVE Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    background:#f4f6f9;
    font-family:Arial;
}

.sidebar{

    width:250px;
    height:100vh;
    background:#212529;
    position:fixed;
    color:white;

}

.sidebar h2{

    text-align:center;
    padding:20px;

}

.sidebar a{

    display:block;
    color:white;
    text-decoration:none;
    padding:15px 25px;

}

.sidebar a:hover{

    background:#0d6efd;

}

.content{

    margin-left:250px;
    padding:30px;

}

.card{

    border:none;
    border-radius:15px;

}

</style>

</head>

<body>

<div class="sidebar">

<h2>BESTTIVE</h2>

<a href="/admin/dashboard">🏠 Dashboard</a>

<a href="/admin/products">📦 Products</a>

<a href="{{ url_for('admin_orders') }}">🛒 Orders</a>

<a href="{{ url_for('admin_customers') }}">👥 Customers</a>

<a href="#">💳 Payments</a>

<a href="/">🌐 Website</a>

<a href="/admin/logout">🚪 Logout</a>

</div>

<div class="content">

<h2>Admin Dashboard</h2>

<div class="row mt-4">

<div class="col-md-3">

<div class="card p-4 shadow">

<h5>Total Products</h5>

<h2>{{ total_products }}</h2>

</div>

</div>

<div class="col-md-3">

<div class="card p-4 shadow">

<h5>Total Orders</h5>

<h2>0</h2>

</div>

</div>

<div class="col-md-3">

<div class="card p-4 shadow">

<h5>Customers</h5>

<h2>0</h2>

</div>

</div>

<div class="col-md-3">

<div class="card p-4 shadow">

<h5>Revenue</h5>

<h2>₹0</h2>

</div>

</div>

</div>

</div>

</body>
</html>
