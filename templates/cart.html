<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">
🛒 My Shopping Cart
</h2>

<table class="table table-bordered table-hover bg-white">

<tr>
    <th>Product</th>
    <th>Price</th>
    <th>Qty</th>
    <th>Total</th>
    <th>Action</th>
</tr>

{% for item in products %}

<tr>

    <td>{{ item.name }}</td>

    <td>₹{{ item.price }}</td>

    <td>

        <a href="/cart/decrease/{{ item.id }}">
            <button>-</button>
        </a>

        {{ item.quantity }}

        <a href="/cart/increase/{{ item.id }}">
            <button>+</button>
        </a>

    </td>

    <td>₹{{ item.subtotal }}</td>

    <td>

        <a href="/cart/delete/{{ item.id }}">
            <button>🗑 Remove</button>
        </a>

    </td>

</tr>

{% endfor %}

</table>

<div class="text-end mt-4">

<h3>
Grand Total :
<span class="text-success">
₹{{ total }}
</span>
</h3>

</div>

<div class="text-end">

<a href="/checkout-cart" class="btn btn-success btn-lg">
Proceed to Checkout
</a>

</div>

</div>

</body>
</html>
