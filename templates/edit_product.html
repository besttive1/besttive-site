<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
        }

        .container{
            width:500px;
            margin:40px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            background:#28a745;
            color:white;
            padding:12px;
            border:none;
            width:100%;
            cursor:pointer;
            border-radius:5px;
            font-size:16px;
        }

        img{
            margin-top:10px;
            border-radius:5px;
        }
    </style>
</head>
<body>

<div class="container">

<h2>Edit Product</h2>

<form method="POST" enctype="multipart/form-data">

<label>Product Name</label>
<input type="text" name="name" value="{{ product.name }}" required>

<label>Price</label>
<input type="number" name="price" value="{{ product.price }}" required>

<label>Description</label>
<textarea name="description">{{ product.description }}</textarea>

<label>Stock</label>
<input type="number" name="stock" value="{{ product.stock }}">

<label>Current Image</label><br>

<img src="{{ url_for('static', filename='uploads/' + product.image) }}" width="120">

<br><br>

<label>Change Image</label>
<input type="file" name="image">

<br><br>

<button type="submit">
Update Product
</button>

</form>

</div>

</body>
</html>
