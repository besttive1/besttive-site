<!DOCTYPE html>
<html>
<head>
  <!-- 🔍 TOP SEARCH BAR -->
<div class="top-bar">

  <div class="top-links">
    <span>Login</span>
    <span>More</span>

  </div>
</div>

<!-- 🛍 CATEGORY BAR -->
<div class="category-bar">

</a>
