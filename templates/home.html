<!DOCTYPE html>
<html>
<head>
    <title>BESTTIVE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- 🔥 HEADER -->
<div class="top-header">

  <!-- LEFT LOGO -->
  <div class="logo">
    <img src="{{ url_for('static', filename='images/logo.png') }}">
  </div>

  <!-- CENTER SEARCH -->
  <div class="search-bar">
    <input type="text" placeholder="Search for Products, Brands and More">
  </div>

  <!-- RIGHT LINKS -->
  <div class="top-links">
    <span class="login-btn" onclick="toggleMenu()">Login</span>
    <span>More</span>
    <span>Cart</span>
  </div>

</div>

<!-- 🔥 LOGIN DROPDOWN -->
<div id="loginMenu" class="login-menu">
  <ul>
    <li><a href="/profile">👤 My Profile</a></li>
    <li><a href="/orders">📦 Orders</a></li>
    <li><a href="/wishlist">❤️ Wishlist</a></li>
    <li><a href="/notifications">🔔 Notifications</a></li>
    <li><a href="/support">🎧 Customer Care</a></li>
    <li><a href="/download">⬇ Download App</a></li>
  </ul>
</div>

<!-- 🛍 CATEGORY BAR -->
<div class="category-bar">
  <div class="cat">👕<p>Fashion</p></div>
  <div class="cat">📱<p>Mobiles</p></div>
  <div class="cat">💄<p>Beauty</p></div>
  <div class="cat">💻<p>Electronics</p></div>
  <div class="cat">🏠<p>Home</p></div>
  <div class="cat">🧸<p>Toys</p></div>
  <div class="cat">📚<p>Books</p></div>
</div>

<!-- PRODUCTS -->
<div class="products">
    {% for product in products %}
    <div class="card">
        <img src="{{ url_for('static', filename=product.image) }}">
        <h3>{{ product.name }}</h3>
        <p>₹{{ product.price }}</p>
        <a href="/payment/{{ product.name }}/{{ product.price }}">
            <button>Buy Now</button>
        </a>
    </div>
    {% endfor %}
</div>

<!-- INSTAGRAM -->
<a href="https://instagram.com/besttive.business" class="insta-float" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" class="insta-icon">
</a>

<!-- WHATSAPP -->
<a href="https://wa.me/918601362353" class="whatsapp-float" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="whatsapp-icon">
</a>

<!-- 🔥 SCRIPT (ONLY ONCE) -->
<script>
function toggleMenu() {
  let menu = document.getElementById("loginMenu");
  menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

document.addEventListener("click", function(e) {
  let menu = document.getElementById("loginMenu");
  let btn = document.querySelector(".login-btn");

  if (btn && !btn.contains(e.target) && !menu.contains(e.target)) {
    menu.style.display = "none";
  }
});
</script>

</body>
</html>
