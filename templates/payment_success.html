<!DOCTYPE html>
<html>
<head>

<title>BESTTIVE | Order Confirmed</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    font-family:Arial;
}

.box{
    max-width:650px;
    margin:60px auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

.success{
    font-size:60px;
}

h2{
    color:#198754;
    margin-top:15px;
}

table{
    margin-top:25px;
}

.btn-home{
    margin-top:25px;
}

</style>

</head>

<body>

<div class="box">

<div class="text-center">

<div class="success">✅</div>

<h2>Payment Successful</h2>

<p>Your order has been placed successfully.</p>

</div>

<hr>

<table class="table table-bordered">

<tr>
<th>Customer</th>
<td>{{ customer_name }}</td>
</tr>

<tr>
<th>Product</th>
<td>{{ product_name }}</td>
</tr>

<tr>
<th>Amount</th>
<td>₹{{ amount }}</td>
</tr>

<tr>
<th>Status</th>
<td>
<span class="badge bg-warning">
{{ status }}
</span>
</td>
</tr>

</table>

<div class="text-center">

<a href="/" class="btn btn-primary btn-home">
Continue Shopping
</a>

<a href="/orders" class="btn btn-success btn-home">
My Orders
</a>

</div>

</div>

</body>
</html>
