<h2>My Profile</h2>

<form method="POST">
  <input name="name" value="{{ user.name }}" placeholder="Name"><br>
  <input name="address" value="{{ user.address }}" placeholder="Address"><br>
  <input name="dob" value="{{ user.dob }}" placeholder="DOB"><br>
  <button type="submit">Update</button>
</form>

<a href="/logout">Logout</a>
